<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoverGalaxy</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --liquid-sheen: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.25) 100%);
            --text-main: #ffffff;
            --text-muted: #c2bdd4;
            --font-round: 'Segoe UI Variable Text', system-ui, -apple-system, sans-serif;
        }

        body {
            font-family: var(--font-round);
            background-image: url('https://img.magnific.com/free-vector/realistic-galaxy-background_23-2148991322.jpg?semt=ais_hybrid&w=740&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .scrim-overlay {
            background-color: rgba(6, 4, 15, 0.7);
            min-height: 100vh;
            width: 100%;
            box-sizing: border-box;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin: 0 0 8px 0;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.1rem;
        }

        /* --- NAVIGATION BARS --- */
        .nav-header {
            max-width: 1100px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(-3px);
        }

        /* --- APPLE LIQUID GLASS MORPHISM --- */
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(210%);
            -webkit-backdrop-filter: blur(30px) saturate(210%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.4),
                inset 0 1px 1px rgba(255, 255, 255, 0.2),
                inset 0 10px 20px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--liquid-sheen);
            pointer-events: none;
            z-index: 1;
        }

        /* --- PAGE VIEWS (SWITCHABLE) --- */
        .view-section {
            display: none;
            max-width: 1100px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease forwards;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- VIEW 1: PLATFORM HUBS --- */
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .console-poster {
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s;
            box-sizing: border-box;
        }

        .console-poster:hover {
            transform: scale(1.03) translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .poster-logo {
            max-width: 65%;
            max-height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
            z-index: 2;
            margin-top: auto;
            margin-bottom: auto;
        }

        .poster-info {
            z-index: 2;
            text-align: center;
            width: 100%;
        }

        .poster-info h2 {
            margin: 0 0 6px 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* --- VIEW 2: GAME POSTER TILES --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .game-poster-card {
            cursor: pointer;
            border-radius: 18px;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .game-poster-card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
        }

        .poster-art-wrapper {
            height: 280px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .poster-title-bar {
            padding: 12px;
            text-align: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* --- VIEW 3: DEDICATED GAME ASSET PAGE --- */
        .asset-page-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .asset-page-layout { grid-template-columns: 2fr 1fr; }
        }

        .media-workspace {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            padding: 40px;
        }

        .asset-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 2;
        }

        .asset-title-tag {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .render-box {
            width: 100%;
            height: 280px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 12px 20px rgba(0,0,0,0.6));
        }

        .render-box.disc-style {
            border-radius: 50%;
            width: 220px;
            height: 220px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .render-box.cartridge-style {
            width: 160px;
            height: 220px;
            border-radius: 8px;
        }

        .side-meta-panel {
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .meta-info-specs h2 { margin: 0 0 10px 0; font-size: 1.8rem; }
        .meta-info-specs span { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; }

        .download-action-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
            z-index: 2;
        }

        .glass-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-family: var(--font-round);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .glass-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: #5ea3ff;
            color: #5ea3ff;
        }
    </style>
</head>
<body>

    <div class="scrim-overlay">
        
        <header id="mainHeader">
            <h1>CoverGalaxy</h1>
            <p>Cover Art For Games</p>
        </header>

        <section id="viewHub" class="view-section active">
            <div class="hub-grid">
                <div class="console-poster liquid-glass" onclick="navigateToCatalog('PlayStation 5')">
                    <img class="poster-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/PlayStation_logo.svg/3840px-PlayStation_logo.svg.png" alt="PS">
                    <div class="poster-info"><h2>PlayStation 5</h2></div>
                </div>
                <div class="console-poster liquid-glass" onclick="navigateToCatalog('Xbox Series X')">
                    <img class="poster-logo" src="https://logos-world.net/wp-content/uploads/2020/11/Xbox-Emblem.png" alt="Xbox">
                    <div class="poster-info"><h2>Xbox Series X</h2></div>
                </div>
                <div class="console-poster liquid-glass" onclick="navigateToCatalog('Nintendo Switch')">
                    <img class="poster-logo" src="https://i.pinimg.com/originals/c7/c0/28/c7c02817fc0ca9cdc534bc615ba27d93.png?nii=t" alt="Nintendo">
                    <div class="poster-info"><h2>Nintendo Switch</h2></div>
                </div>
            </div>
        </section>

        <section id="viewCatalog" class="view-section">
            <div class="nav-header">
                <button class="back-btn" onclick="switchView('viewHub')">← Back to Consoles</button>
                <h2 id="catalogPlatformTitle" style="margin:0;">Games</h2>
            </div>
            <div class="catalog-grid" id="catalogGrid"></div>
        </section>

        <section id="viewAssetPage" class="view-section">
            <div class="nav-header">
                <button class="back-btn" id="assetPageBackButton">← Back to Catalog</button>
            </div>
            
            <div class="asset-page-layout">
                <div class="media-workspace liquid-glass" id="assetBoard"></div>
                
                <div class="side-meta-panel liquid-glass">
                    <div class="meta-info-specs">
                        <span id="assetMetaConsole">Console</span>
                        <h2 id="assetMetaTitle" style="margin-top:15px;">Game Title</h2>
                        <p style="color: var(--text-muted); font-size:0.9rem; line-height:1.5;">Print specifications configured for standard dimensions at 300 DPI high-resolution output layouts.</p>
                    </div>
                    <div class="download-action-stack" id="actionStack"></div>
                </div>
            </div>
        </section>

    </div>

    <script>
        // ========================================================
        //  THE MAIN REPOSITORY DATA TREE
        // ========================================================
        const GAME_DATABASE = [
            {
                title: "Cyber Net 2026",
                console: "Nintendo Switch",
                posterThumb: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=400",
                coverImg: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800",
                mediaImg: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=400" 
            },
            {
                title: "Resident Evil Requiem",
                console: "PlayStation 5",
                posterThumb: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400",
                coverImg: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800",
                mediaImg: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=400"
            },
            {
                title: "Starfield Turbo",
                console: "Xbox Series X",
                posterThumb: "https://image.api.playstation.com/vulcan/ap/rnd/202512/1205/e0364b3089bbbad7e0a04f87cab6c273172515a134efdf88.png",
                coverImg: "https://images.unsplash.com/photo-1538481199705-c710c4e965fc?q=80&w=800",
                mediaImg: "https://images.unsplash.com/photo-1580234810907-b40315b76418?q=80&w=400"
            }
        ];

        let activePlatform = "";

        // CORE ROUTER VIEW CONTROLLER
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            // Hide main global header on asset page to make room
            document.getElementById('mainHeader').style.display = (viewId === 'viewAssetPage') ? 'none' : 'block';
        }

        // STEP 1 -> STEP 2: OPEN PLATFORM COLLECTION (SHOW POSTERS)
        function navigateToCatalog(platform) {
            activePlatform = platform;
            document.getElementById('catalogPlatformTitle').innerText = `${platform} Collection`;
            
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = "";

            const filteredGames = GAME_DATABASE.filter(g => g.console === platform);

            if(filteredGames.length === 0) {
                grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-muted);">No posters uploaded for this console line yet.</p>`;
            } else {
                filteredGames.forEach(game => {
                    const posterHTML = `
                        <div class="game-poster-card liquid-glass" onclick="navigateToAssetPage('${game.title.replace(/'/g, "\\'")}')">
                            <div class="poster-art-wrapper" style="background-image: url('${game.posterThumb}');"></div>
                            <div class="poster-title-bar">${game.title}</div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', posterHTML);
                });
            }
            switchView('viewCatalog');
        }

        // STEP 2 -> STEP 3: OPEN SPECIFIC GAME PAGE
        function navigateToAssetPage(gameTitle) {
            const game = GAME_DATABASE.find(g => g.title === gameTitle);
            if(!game) return;

            // Set up back button routing
            document.getElementById('assetPageBackButton').onclick = () => navigateToCatalog(game.console);

            // Populate text parameters
            document.getElementById('assetMetaConsole').innerText = game.console;
            document.getElementById('assetMetaTitle').innerText = game.title;

            // Determine Media Styles dynamically
            const isCart = game.console.includes("Nintendo");
            const mediaLabel = isCart ? "Cartridge" : "Disc Art";
            const mediaClass = isCart ? "cartridge-style" : "disc-style";

            // Inject the Side-by-Side media elements
            const board = document.getElementById('assetBoard');
            board.innerHTML = `
                <div class="asset-block">
                    <span class="asset-title-tag">Full Wrapper Print Cover</span>
                    <div class="render-box" style="background-image: url('${game.coverImg}');"></div>
                </div>
                <div class="asset-block">
                    <span class="asset-title-tag">Physical ${mediaLabel} Asset</span>
                    <div class="render-box ${mediaClass}" style="background-image: url('${game.mediaImg}');"></div>
                </div>
            `;

            // Inject Custom Download Buttons
            const stack = document.getElementById('actionStack');
            stack.innerHTML = `
                <button class="glass-btn" onclick="alert('Downloading printable layout for ${game.title}...')">Download Full Box Cover</button>
                <button class="glass-btn" onclick="alert('Downloading printing template for ${game.title} ${mediaLabel}...')">Download ${mediaLabel} Label</button>
            `;

            switchView('viewAssetPage');
        }
    </script>
</body>
</html>
