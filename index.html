<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoverGalaxy — Archive</title>
    <style>
        :root {
            --glass-card: rgba(18, 16, 28, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-glow: rgba(255, 255, 255, 0.03);
            --text-primary: #ffffff;
            --text-secondary: #9b97b0;
            --accent-glow: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 60%);
            --font-display: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-display);
            background-image: url('https://img.magnific.com/free-vector/realistic-galaxy-background_23-2148991322.jpg?semt=ais_hybrid&w=740&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            background-color: rgba(4, 3, 10, 0.65);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin: 0 0 10px 0;
        }

        header p {
            color: var(--text-secondary);
            margin: 0;
            font-size: 1.1rem;
            font-weight: 400;
        }

        /* --- NAVIGATION --- */
        .navigation-row {
            max-width: 1100px;
            margin: 0 auto 40px auto;
            width: 100%;
            display: flex;
            align-items: center;
        }

        .action-back-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 50px;
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            font-family: var(--font-display);
        }

        .action-back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
            border-color: rgba(255,255,255,0.2);
        }

        /* --- CORE LIQUID GLASS FRAMEWORK --- */
        .glass-frame {
            background: var(--glass-card);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .glass-frame::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--accent-glow);
            pointer-events: none;
            z-index: 1;
        }

        /* --- SWITCHABLE ENGINE --- */
        .app-view {
            display: none;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            animation: viewTransition 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .app-view.active {
            display: block;
        }

        @keyframes viewTransition {
            from { opacity: 0; transform: scale(0.99) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- SCREEN 1: CONSOLE HUB --- */
        .hub-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .console-panel-card {
            height: 360px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 30px;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .console-panel-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(24, 21, 38, 0.75);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .brand-vector {
            max-width: 70%;
            max-height: 90px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            z-index: 2;
            margin-top: auto;
            margin-bottom: auto;
        }

        .brand-meta-label {
            z-index: 2;
            text-align: center;
            width: 100%;
        }

        .brand-meta-label h2 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* --- SCREEN 2: GAME GRID --- */
        .catalog-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        .game-tile-poster {
            cursor: pointer;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .game-tile-poster:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            border-color: rgba(255,255,255,0.2);
        }

        .poster-image-frame {
            height: 300px;
            background-size: cover;
            background-position: center;
            background-color: rgba(0,0,0,0.2);
        }

        .poster-caption-strip {
            padding: 16px;
            text-align: center;
            background: rgba(10, 8, 18, 0.6);
            backdrop-filter: blur(20px);
            font-weight: 600;
            font-size: 0.95rem;
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        /* --- SCREEN 3: ASSET PAGE --- */
        .asset-split-workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 850px) {
            .asset-split-workspace { grid-template-columns: 2.2fr 1fr; }
        }

        .gallery-canvas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 40px;
            padding: 50px;
            align-items: center;
            justify-content: center;
        }

        .gallery-canvas.single-item-layout {
            grid-template-columns: 1fr;
        }

        .media-asset-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            width: 100%;
        }

        .asset-group-header {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-weight: 700;
        }

        .asset-preview-render {
            width: 100%;
            height: 320px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 20px 35px rgba(0,0,0,0.65));
        }

        .asset-preview-render.disc-shape {
            border-radius: 50%;
            width: 250px;
            height: 250px;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .asset-preview-render.cartridge-shape {
            width: 180px;
            height: 250px;
            border-radius: 8px;
        }

        /* SIDEBAR PROPORTIONS */
        .sidebar-panel {
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar-meta-block h2 {
            margin: 0 0 12px 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .sidebar-meta-block span {
            background: rgba(255,255,255,0.08);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .button-download-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 40px;
            z-index: 2;
        }

        .interactive-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 14px;
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .interactive-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header id="appGlobalHeader">
            <h1>CoverGalaxy</h1>
            <p>Digital Preservation & High-Resolution Asset Vault</p>
        </header>

        <section id="screenHub" class="app-view active">
            <div class="hub-layout">
                <div class="console-panel-card glass-frame" onclick="openPlatformCatalog('PlayStation 5')">
                    <img class="brand-vector" src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/PlayStation_logo.svg/3840px-PlayStation_logo.svg.png" alt="PlayStation">
                    <div class="brand-meta-label"><h2>PlayStation 5</h2></div>
                </div>
                <div class="console-panel-card glass-frame" onclick="openPlatformCatalog('Xbox Series X')">
                    <img class="brand-vector" src="https://logos-world.net/wp-content/uploads/2020/11/Xbox-Emblem.png" alt="Xbox">
                    <div class="brand-meta-label"><h2>Xbox Series X</h2></div>
                </div>
                <div class="console-panel-card glass-frame" onclick="openPlatformCatalog('Nintendo Switch')">
                    <img class="brand-vector" src="https://i.pinimg.com/originals/c7/c0/28/c7c02817fc0ca9cdc534bc615ba27d93.png?nii=t" alt="Nintendo">
                    <div class="brand-meta-label"><h2>Nintendo Switch</h2></div>
                </div>
            </div>
        </section>

        <section id="screenCatalog" class="app-view">
            <div class="navigation-row">
                <button class="action-back-btn" onclick="goToView('screenHub')">← Back to Platforms</button>
            </div>
            <div class="catalog-layout" id="catalogInjectionGrid"></div>
        </section>

        <section id="screenAssetWorkspace" class="app-view">
            <div class="navigation-row">
                <button class="action-back-btn" id="workspaceNavigationBackTrigger">← Back to Catalog</button>
            </div>
            
            <div class="asset-split-workspace">
                <div class="gallery-canvas glass-frame" id="displayBoard"></div>
                
                <div class="sidebar-panel glass-frame">
                    <div class="sidebar-meta-block">
                        <span id="metaPlatformBadge">Platform</span>
                        <h2 id="metaGameTitle" style="margin-top:20px;">Game Title</h2>
                    </div>
                    <div class="button-download-stack" id="downloadButtonContainer"></div>
                </div>
            </div>
        </section>

    </div>

    <script>
        // ========================================================
        //  DATABASE REGISTRY
        //  Tip: Set mediaImg to "none" if there is no disc artwork!
        // ========================================================
        const GAME_DATABASE = [
            {
                title: "Resident Evil Requiem",
                console: "PlayStation 5",
                posterThumb: "https://image.api.playstation.com/vulcan/ap/rnd/202512/1205/e0364b3089bbbad7e0a04f87cab6c273172515a134efdf88.png", 
                coverImg: "https://www.thecoverproject.net/uploads/pending/playstation_5.residentevilrequiem_EU.17740698031648829433.jpg", 
                mediaImg: "none"
            },
            {
                title: "Cyber Net 2026",
                console: "Nintendo Switch",
                posterThumb: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=400",
                coverImg: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800",
                mediaImg: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=400"
            },
            {
                title: "Grand Theft Auto VI",
                console: "PlayStation 5",
                posterThumb: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400",
                coverImg: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800",
                mediaImg: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=400"
            }
        ];

        let selectedPlatform = "";

        function goToView(viewId) {
            document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.getElementById('appGlobalHeader').style.display = (viewId === 'screenAssetWorkspace') ? 'none' : 'block';
        }

        function openPlatformCatalog(platform) {
            selectedPlatform = platform;
            const grid = document.getElementById('catalogInjectionGrid');
            grid.innerHTML = "";

            const matches = GAME_DATABASE.filter(g => g.console === platform);

            if(matches.length === 0) {
                grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-secondary); padding:40px;">No covers found in this system category.</p>`;
            } else {
                matches.forEach(game => {
                    const cardHTML = `
                        <div class="game-tile-poster glass-frame" onclick="openGameWorkspace('${game.title.replace(/'/g, "\\'")}')">
                            <div class="poster-image-frame" style="background-image: url('${game.posterThumb}');"></div>
                            <div class="poster-caption-strip">${game.title}</div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                });
            }
            goToView('screenCatalog');
        }

        function forceSystemDownload(url, filename) {
            const downloadTrigger = document.createElement('a');
            downloadTrigger.href = url;
            downloadTrigger.download = filename;
            downloadTrigger.target = '_blank';
            document.body.appendChild(downloadTrigger);
            downloadTrigger.click();
            document.body.removeChild(downloadTrigger);
        }

        function openGameWorkspace(gameTitle) {
            const game = GAME_DATABASE.find(g => g.title === gameTitle);
            if(!game) return;

            document.getElementById('workspaceNavigationBackTrigger').onclick = () => openPlatformCatalog(game.console);
            document.getElementById('metaPlatformBadge').innerText = game.console;
            document.getElementById('metaGameTitle').innerText = game.title;

            const board = document.getElementById('displayBoard');
            const buttonContainer = document.getElementById('downloadButtonContainer');
            
            const hasMedia = game.mediaImg && game.mediaImg.toLowerCase() !== 'none';

            let boardHTML = `
                <div class="media-asset-group">
                    <span class="asset-group-header">Full Wrap Cover</span>
                    <div class="asset-preview-render" style="background-image: url('${game.coverImg}');"></div>
                </div>
            `;

            let actionHTML = `
                <button class="interactive-btn" onclick="forceSystemDownload('${game.coverImg}', '${game.title.replace(/\s+/g, '_')}_Cover.jpg')">Download Cover</button>
            `;

            if (hasMedia) {
                board.classList.remove('single-item-layout');
                const isNintendo = game.console.includes("Nintendo");
                const label = isNintendo ? "Cartridge" : "Disc Art";
                const shapeClass = isNintendo ? "cartridge-shape" : "disc-shape";

                boardHTML += `
                    <div class="media-asset-group">
                        <span class="asset-group-header">${label}</span>
                        <div class="asset-preview-render ${shapeClass}" style="background-image: url('${game.mediaImg}');"></div>
                    </div>
                `;

                actionHTML += `
                    <button class="interactive-btn" onclick="forceSystemDownload('${game.mediaImg}', '${game.title.replace(/\s+/g, '_')}_Media.jpg')">Download ${label}</button>
                `;
            } else {
                board.classList.add('single-item-layout');
            }

            board.innerHTML = boardHTML;
            buttonContainer.innerHTML = actionHTML;

            goToView('screenAssetWorkspace');
        }
    </script>
</body>
</html>
